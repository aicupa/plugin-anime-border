<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">

  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #111827;
      color: white;
      font-family: Inter, sans-serif;
    }

    .card {
      width: 340px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .desc {
      color: #9ca3af;
      font-size: 12px;
      margin-bottom: 16px;
    }

    button {

      width: 100%;

      margin-bottom: 8px;

      padding: 12px;

      border: none;

      border-radius: 10px;

      cursor: pointer;

      color: white;

      background: #1f2937;
    }

    button:hover {
      background: #374151;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="title">
      Anime Atmosphere Collection
    </div>

    <div class="desc">
      Bring gentle anime-inspired environmental effects to your workspace.
    </div>

    <button onclick="setEffect('rain')">
      🌧 Rain Window
    </button>

    <button onclick="setEffect('thunder')">
      ⛈ Thunder Storm
    </button>

    <button onclick="setEffect('sakura')">
      🌸 Sakura Petals
    </button>

    <button onclick="setEffect('water')">
      🌊 Water Ripples
    </button>

    <button onclick="setEffect('grass')">
      🍃 Meadow Breeze
    </button>

  </div>

  <script>

    function setEffect(effect) {

      localStorage.setItem(
        "anime_effect",
        effect
      );

      window.parent.postMessage({
        type: "plugin-call",
        method: "switchEffect",
        effect
      }, "*");
    }

  </script>

</body>

</html>
